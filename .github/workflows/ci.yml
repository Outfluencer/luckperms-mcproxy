name: Build

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile with Gradle
        run: ./gradlew :mcproxy:build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: LuckPerms-MCProxy
          path: mcproxy/build/libs/LuckPerms-MCProxy-*.jar
